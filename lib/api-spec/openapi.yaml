openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: words
  - name: themes
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /words:
    get:
      operationId: listWords
      tags: [words]
      responses:
        "200":
          description: List of words
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VocabWord"
    post:
      operationId: createWord
      tags: [words]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WordInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabWord"
        "400":
          description: Bad request

  /words/bulk:
    post:
      operationId: bulkCreateWords
      tags: [words]
      summary: Bulk create words, skipping duplicates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WordBulkInput"
      responses:
        "200":
          description: Bulk import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"
        "400":
          description: Bad request

  /words/{id}:
    patch:
      operationId: updateWord
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WordUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabWord"
        "404":
          description: Not found
    delete:
      operationId: deleteWord
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /themes:
    get:
      operationId: listThemes
      tags: [themes]
      summary: List all themes
      responses:
        "200":
          description: List of themes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ThemeSummary"
    post:
      operationId: createTheme
      tags: [themes]
      summary: Create a theme
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThemeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemeDetail"
        "400":
          description: Bad request

  /themes/{id}:
    get:
      operationId: getTheme
      tags: [themes]
      summary: Get theme detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Theme detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemeDetail"
        "404":
          description: Not found
    patch:
      operationId: updateTheme
      tags: [themes]
      summary: Update theme name
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThemeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemeDetail"
        "404":
          description: Not found
    delete:
      operationId: deleteTheme
      tags: [themes]
      summary: Delete theme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /themes/{id}/words:
    put:
      operationId: replaceThemeWords
      tags: [themes]
      summary: Replace all words in theme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThemeWordsInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemeDetail"
        "404":
          description: Not found
    post:
      operationId: addThemeWords
      tags: [themes]
      summary: Add words to theme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThemeWordsInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemeDetail"
        "404":
          description: Not found

  /themes/{id}/words/{wordId}:
    delete:
      operationId: removeThemeWord
      tags: [themes]
      summary: Remove word from theme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: wordId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed
        "404":
          description: Not found

  /themes/{id}/questions:
    get:
      operationId: listThemeQuestions
      tags: [themes]
      summary: List quiz questions for theme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ThemeQuizQuestion"
        "404":
          description: Not found
    put:
      operationId: replaceThemeQuestions
      tags: [themes]
      summary: Replace all quiz questions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThemeQuestionsInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ThemeQuizQuestion"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    VocabWord:
      type: object
      required: [id, kanji, pronunciation, meaning, description, srsExamples, level, starred, pronLevel, pronStarred, meaningLevel, meaningStarred, date, createdAt, relatedWordIds]
      properties:
        id:
          type: integer
        kanji:
          type: string
        pronunciation:
          type: string
        meaning:
          type: string
        description:
          type: string
        srsExamples:
          type: array
          items:
            $ref: "#/components/schemas/SrsExample"
        level:
          type: integer
        starred:
          type: boolean
        pronLevel:
          type: integer
        pronStarred:
          type: boolean
        meaningLevel:
          type: integer
        meaningStarred:
          type: boolean
        jlptLevel:
          type: ["string", "null"]
        date:
          type: string
        createdAt:
          type: string
        relatedWordIds:
          type: array
          items:
            type: integer

    WordInput:
      type: object
      required: [kanji, date]
      properties:
        kanji:
          type: string
          minLength: 1
        pronunciation:
          type: string
        meaning:
          type: string
        description:
          type: string
        srsExamples:
          type: array
          items:
            $ref: "#/components/schemas/SrsExample"
        level:
          type: integer
          minimum: 1
          maximum: 5
        jlptLevel:
          type: string
        date:
          type: string
        relatedWordIds:
          type: array
          items:
            type: integer

    WordUpdate:
      type: object
      properties:
        kanji:
          type: string
          minLength: 1
        pronunciation:
          type: string
        meaning:
          type: string
        description:
          type: string
        srsExamples:
          type: array
          items:
            $ref: "#/components/schemas/SrsExample"
        level:
          type: integer
          minimum: 1
          maximum: 5
        starred:
          type: boolean
        pronLevel:
          type: integer
          minimum: 1
          maximum: 5
        pronStarred:
          type: boolean
        meaningLevel:
          type: integer
          minimum: 1
          maximum: 5
        meaningStarred:
          type: boolean
        jlptLevel:
          type: ["string", "null"]
        date:
          type: string
        relatedWordIds:
          type: array
          items:
            type: integer

    WordBulkInput:
      type: object
      required: [words]
      properties:
        words:
          type: array
          items:
            $ref: "#/components/schemas/BulkWordItem"

    BulkWordItem:
      type: object
      required: [kanji]
      properties:
        kanji:
          type: string
          minLength: 1
        pronunciation:
          type: string
        meaning:
          type: string
        description:
          type: string
        srsExamples:
          type: array
          items:
            $ref: "#/components/schemas/SrsExample"
        jlptLevel:
          type: string

    BulkImportResult:
      type: object
      required: [total, added, updated, updatedWords]
      properties:
        total:
          type: integer
        added:
          type: integer
        updated:
          type: integer
        updatedWords:
          type: array
          items:
            type: string

    SrsExampleHint:
      type: object
      required: [text]
      properties:
        text:
          type: string
        highlights:
          type: array
          items:
            type: string

    RubyPart:
      type: object
      required: [base]
      properties:
        base:
          type: string
        reading:
          type: string

    TargetChunk:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [text, hidden]
        text:
          type: string
        reading:
          type: string
        ruby:
          type: array
          items:
            $ref: "#/components/schemas/RubyPart"
        script:
          type: string
          enum: [kanji, hiragana, katakana]

    LinkedToken:
      type: object
      required: [start, end, surface, wordId]
      properties:
        start:
          type: integer
        end:
          type: integer
        surface:
          type: string
        wordId:
          type: integer
        lemma:
          type: string

    SrsExample:
      type: object
      required: [order, sentence, hiddenWord, hints]
      properties:
        order:
          type: integer
        sentence:
          type: string
        hiddenWord:
          type: string
        hiddenReading:
          type: string
        hiddenScript:
          type: string
          enum: [kanji, hiragana, katakana]
        targetChunks:
          type: array
          items:
            $ref: "#/components/schemas/TargetChunk"
        linkedTokens:
          type: array
          items:
            $ref: "#/components/schemas/LinkedToken"
        hints:
          type: array
          items:
            $ref: "#/components/schemas/SrsExampleHint"

    ThemeSummary:
      type: object
      required: [id, name, sortOrder, wordCount, questionCount, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        sortOrder:
          type: integer
        wordCount:
          type: integer
        questionCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string

    ThemeDetail:
      type: object
      required: [id, name, sortOrder, wordIds, questions, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        sortOrder:
          type: integer
        wordIds:
          type: array
          items:
            type: integer
        questions:
          type: array
          items:
            $ref: "#/components/schemas/ThemeQuizQuestion"
        createdAt:
          type: string
        updatedAt:
          type: string

    ThemeInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        wordIds:
          type: array
          items:
            type: integer

    ThemeUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        sortOrder:
          type: integer

    ThemeWordsInput:
      type: object
      required: [wordIds]
      properties:
        wordIds:
          type: array
          items:
            type: integer

    ThemeQuizChoice:
      type: object
      required: [key, label]
      properties:
        key:
          type: string
        label:
          type: string

    ThemeQuizQuestion:
      type: object
      required: [id, sortOrder, type, prompt, choices, correctKey, hints]
      properties:
        id:
          type: integer
        sortOrder:
          type: integer
        type:
          type: string
          enum: [ab, four]
        prompt:
          type: string
        choices:
          type: array
          items:
            $ref: "#/components/schemas/ThemeQuizChoice"
        correctKey:
          type: string
        hints:
          type: array
          items:
            $ref: "#/components/schemas/SrsExampleHint"

    ThemeQuestionsInput:
      type: object
      required: [questions]
      properties:
        questions:
          type: array
          items:
            $ref: "#/components/schemas/ThemeQuizQuestionInput"

    ThemeQuizQuestionInput:
      type: object
      required: [sortOrder, type, prompt, choices, correctKey, hints]
      properties:
        sortOrder:
          type: integer
        type:
          type: string
          enum: [ab, four]
        prompt:
          type: string
        choices:
          type: array
          items:
            $ref: "#/components/schemas/ThemeQuizChoice"
        correctKey:
          type: string
        hints:
          type: array
          items:
            $ref: "#/components/schemas/SrsExampleHint"
